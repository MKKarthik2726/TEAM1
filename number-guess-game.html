<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Oracle's Number Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --amber: #FF8C00;
    --deep-amber: #FF4500;
    --cream: #FFF8E7;
    --warm-brown: #4A2C0A;
    --light-glow: rgba(255,200,50,0.18);
    --card-bg: rgba(40,18,5,0.82);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'Lato', sans-serif;
    background: linear-gradient(135deg, #1a0500 0%, #3b1200 25%, #6b2d00 50%, #3b1200 75%, #1a0500 100%);
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Animated background particles */
  .bg-particles {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .spark {
    position: absolute;
    width: 3px; height: 3px;
    background: radial-gradient(circle, #FFD700, transparent);
    border-radius: 50%;
    animation: floatSpark linear infinite;
    opacity: 0;
  }
  @keyframes floatSpark {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  /* Warm light glow effect */
  .warm-glow {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 700px; height: 700px;
    background: radial-gradient(ellipse, rgba(255,140,0,0.13) 0%, rgba(255,69,0,0.07) 50%, transparent 75%);
    pointer-events: none; z-index: 0;
    animation: pulseGlow 3s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.7; }
    50% { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
  }

  /* Main container */
  .game-wrapper {
    position: relative; z-index: 1;
    width: 100%; max-width: 520px;
    padding: 20px;
  }

  /* Title */
  .title-section {
    text-align: center; margin-bottom: 10px;
  }
  .title-section h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.2rem, 4vw, 1.7rem);
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,200,50,0.7), 0 0 40px rgba(255,140,0,0.4);
    letter-spacing: 2px;
    animation: titleShimmer 2.5s ease-in-out infinite;
  }
  @keyframes titleShimmer {
    0%, 100% { text-shadow: 0 0 20px rgba(255,200,50,0.7), 0 0 40px rgba(255,140,0,0.4); }
    50% { text-shadow: 0 0 30px rgba(255,220,80,1), 0 0 60px rgba(255,140,0,0.7), 0 0 80px rgba(255,69,0,0.3); }
  }
  .subtitle {
    font-size: 0.78rem; color: rgba(255,200,100,0.6);
    letter-spacing: 4px; text-transform: uppercase; margin-top: 4px;
  }

  /* Character card */
  .character-card {
    background: var(--card-bg);
    border: 1px solid rgba(255,180,50,0.25);
    border-radius: 20px;
    padding: 20px;
    margin: 14px 0;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,200,50,0.1);
    position: relative; overflow: hidden;
  }
  .character-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,180,50,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Oracle character */
  .oracle-section {
    display: flex; align-items: flex-start; gap: 16px;
  }
  .oracle-avatar {
    flex-shrink: 0;
    width: 80px; height: 80px;
    position: relative;
  }
  .oracle-face {
    width: 80px; height: 80px;
    background: radial-gradient(circle at 40% 35%, #c87941, #7a3d10 60%, #3a1800);
    border-radius: 50%;
    border: 2px solid rgba(255,180,50,0.5);
    box-shadow: 0 0 25px rgba(255,150,30,0.5), inset 0 -4px 10px rgba(0,0,0,0.4);
    position: relative;
    animation: oracleBreathe 3s ease-in-out infinite;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 38px;
  }
  @keyframes oracleBreathe {
    0%, 100% { transform: scale(1); box-shadow: 0 0 25px rgba(255,150,30,0.5); }
    50% { transform: scale(1.03); box-shadow: 0 0 35px rgba(255,180,50,0.8); }
  }
  .oracle-glow-ring {
    position: absolute; inset: -5px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: conic-gradient(from 0deg, #FFD700, #FF8C00, #FF4500, #FFD700) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    animation: spinRing 4s linear infinite;
    opacity: 0.7;
  }
  @keyframes spinRing {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .oracle-text-box {
    flex: 1;
  }
  .oracle-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.75rem; color: var(--gold);
    letter-spacing: 2px; margin-bottom: 6px;
    opacity: 0.8;
  }
  .oracle-speech {
    background: rgba(255,160,30,0.08);
    border: 1px solid rgba(255,180,50,0.2);
    border-radius: 12px 12px 12px 0;
    padding: 10px 14px;
    font-size: 0.88rem;
    color: var(--cream);
    line-height: 1.55;
    position: relative;
    min-height: 54px;
    display: flex; align-items: center;
  }
  .oracle-speech::before {
    content: '';
    position: absolute; bottom: -8px; left: -1px;
    border-width: 8px 8px 0 0;
    border-style: solid;
    border-color: rgba(255,180,50,0.2) transparent transparent transparent;
  }
  .speech-text {
    transition: opacity 0.3s;
  }

  /* Try counter */
  .stats-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding: 10px 16px;
    background: rgba(255,150,30,0.07);
    border: 1px solid rgba(255,180,50,0.15);
    border-radius: 12px;
  }
  .stat-item { text-align: center; }
  .stat-label {
    font-size: 0.65rem; color: rgba(255,200,100,0.5);
    text-transform: uppercase; letter-spacing: 2px; display: block;
  }
  .stat-value {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.3rem; color: var(--gold);
    text-shadow: 0 0 12px rgba(255,200,50,0.6);
    transition: transform 0.2s, color 0.2s;
  }
  .stat-value.bump {
    animation: bumpAnim 0.3s ease;
  }
  @keyframes bumpAnim {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); color: #fff; }
    100% { transform: scale(1); }
  }
  .divider-dot {
    width: 1px; height: 36px;
    background: linear-gradient(to bottom, transparent, rgba(255,180,50,0.3), transparent);
  }

  /* Range display */
  .range-display {
    text-align: center; margin-bottom: 12px;
    font-size: 0.75rem; color: rgba(255,180,80,0.6);
    letter-spacing: 1px;
  }
  .range-bar {
    height: 4px;
    background: rgba(255,150,30,0.15);
    border-radius: 2px;
    margin: 6px 0 12px;
    position: relative; overflow: hidden;
  }
  .range-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--amber), var(--gold));
    border-radius: 2px;
    transition: left 0.5s ease, width 0.5s ease;
    position: absolute;
    box-shadow: 0 0 8px rgba(255,200,50,0.6);
  }

  /* Input section */
  .input-section {
    display: flex; gap: 10px; margin-bottom: 14px;
  }
  .guess-input {
    flex: 1;
    background: rgba(255,150,30,0.07);
    border: 1.5px solid rgba(255,180,50,0.3);
    border-radius: 12px;
    padding: 13px 18px;
    font-size: 1.1rem;
    color: var(--cream);
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    letter-spacing: 3px;
  }
  .guess-input:focus {
    border-color: rgba(255,200,50,0.7);
    box-shadow: 0 0 20px rgba(255,200,50,0.2);
    background: rgba(255,150,30,0.12);
  }
  .guess-input::placeholder { color: rgba(255,200,100,0.25); letter-spacing: 1px; font-size: 0.85rem; }
  .guess-input::-webkit-inner-spin-button,
  .guess-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .submit-btn {
    background: linear-gradient(135deg, #FF8C00, #FF4500);
    border: none; border-radius: 12px;
    padding: 13px 22px;
    color: #fff;
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.75rem; letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,100,0,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
  }
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(255,100,0,0.6);
  }
  .submit-btn:active { transform: translateY(0); }

  /* Hint section */
  .hint-box {
    padding: 12px 16px;
    border-radius: 12px;
    margin-bottom: 14px;
    text-align: center;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 1px;
    transition: all 0.4s ease;
    min-height: 46px;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    opacity: 0;
    transform: translateY(6px);
  }
  .hint-box.visible {
    opacity: 1; transform: translateY(0);
  }
  .hint-box.too-low {
    background: rgba(30,120,255,0.12);
    border: 1px solid rgba(100,160,255,0.3);
    color: #90C8FF;
    box-shadow: 0 0 20px rgba(30,120,255,0.1);
  }
  .hint-box.too-high {
    background: rgba(255,60,30,0.12);
    border: 1px solid rgba(255,120,80,0.3);
    color: #FF9080;
    box-shadow: 0 0 20px rgba(255,60,30,0.1);
  }
  .hint-box.correct {
    background: rgba(50,220,100,0.12);
    border: 1px solid rgba(80,220,120,0.4);
    color: #80FFB0;
    box-shadow: 0 0 25px rgba(50,220,100,0.2);
  }
  .hint-icon { font-size: 1.3rem; }

  /* Previous guesses */
  .prev-guesses {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
    min-height: 28px;
  }
  .guess-tag {
    background: rgba(255,150,30,0.1);
    border: 1px solid rgba(255,180,50,0.2);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 0.75rem; color: rgba(255,200,100,0.7);
    letter-spacing: 1px;
    animation: tagPop 0.2s ease;
  }
  @keyframes tagPop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Play again button */
  .play-again-btn {
    display: none;
    width: 100%;
    background: linear-gradient(135deg, rgba(255,200,50,0.15), rgba(255,120,30,0.1));
    border: 1.5px solid rgba(255,200,50,0.4);
    border-radius: 14px;
    padding: 14px;
    color: var(--gold);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.85rem; letter-spacing: 2px;
    cursor: pointer;
    margin-top: 4px;
    transition: all 0.25s;
    box-shadow: 0 0 20px rgba(255,200,50,0.1);
  }
  .play-again-btn:hover {
    background: linear-gradient(135deg, rgba(255,200,50,0.25), rgba(255,120,30,0.18));
    box-shadow: 0 0 30px rgba(255,200,50,0.25);
    transform: translateY(-2px);
  }
  .play-again-btn.visible { display: block; animation: fadeIn 0.5s ease; }

  /* Win celebration */
  @keyframes celebrate {
    0% { transform: scale(1); }
    25% { transform: scale(1.05) rotate(-1deg); }
    50% { transform: scale(1.08) rotate(1deg); }
    75% { transform: scale(1.05) rotate(-0.5deg); }
    100% { transform: scale(1); }
  }
  .celebrating { animation: celebrate 0.6s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Confetti burst */
  .confetti-burst {
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confettiFall 2s ease-out forwards;
    opacity: 0;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg) scale(0); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; }
  }

  /* Shake animation for wrong */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<div class="bg-particles" id="bgParticles"></div>
<div class="warm-glow"></div>

<div class="game-wrapper" id="gameWrapper">
  <!-- Title -->
  <div class="title-section">
    <h1>THE ORACLE'S VAULT</h1>
    <div class="subtitle">✦ Mystical Number Realm ✦</div>
  </div>

  <!-- Character Card -->
  <div class="character-card" id="characterCard">
    <div class="oracle-section">
      <div class="oracle-avatar">
        <div class="oracle-face" id="oracleFace">🧙‍♂️</div>
        <div class="oracle-glow-ring"></div>
      </div>
      <div class="oracle-text-box">
        <div class="oracle-name">✦ ORACLE ZEPHYROS ✦</div>
        <div class="oracle-speech">
          <span class="speech-text" id="speechText">Ahh, welcome, brave soul... I have hidden a number between <strong style="color:var(--gold)">1 and 100</strong> in my mystical vault. Can you unveil it? 🔮</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-item">
      <span class="stat-label">Attempts</span>
      <span class="stat-value" id="tryCount">0</span>
    </div>
    <div class="divider-dot"></div>
    <div class="stat-item">
      <span class="stat-label">Best Score</span>
      <span class="stat-value" id="bestScore">—</span>
    </div>
    <div class="divider-dot"></div>
    <div class="stat-item">
      <span class="stat-label">Range</span>
      <span class="stat-value" id="rangeDisplay" style="font-size:0.85rem">1–100</span>
    </div>
  </div>

  <!-- Range Bar -->
  <div class="range-bar">
    <div class="range-fill" id="rangeFill" style="left:0%;width:100%"></div>
  </div>

  <!-- Previous Guesses -->
  <div class="prev-guesses" id="prevGuesses"></div>

  <!-- Hint Box -->
  <div class="hint-box" id="hintBox">
    <span class="hint-icon" id="hintIcon"></span>
    <span id="hintText"></span>
  </div>

  <!-- Input -->
  <div class="input-section">
    <input type="number" class="guess-input" id="guessInput" placeholder="Enter your guess..." min="1" max="100">
    <button class="submit-btn" onclick="submitGuess()">REVEAL</button>
  </div>

  <!-- Play Again -->
  <button class="play-again-btn" id="playAgainBtn" onclick="resetGame()">⟳ &nbsp;CONSULT ORACLE AGAIN</button>
</div>

<!-- Confetti container -->
<div class="confetti-burst" id="confettiBurst"></div>

<script>
  // === Spark Particles ===
  const bgP = document.getElementById('bgParticles');
  for (let i = 0; i < 25; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    s.style.cssText = `
      left: ${Math.random()*100}%;
      width: ${2+Math.random()*4}px;
      height: ${2+Math.random()*4}px;
      animation-duration: ${4+Math.random()*8}s;
      animation-delay: ${Math.random()*8}s;
    `;
    bgP.appendChild(s);
  }

  // === Game Logic ===
  let secretNumber, tryCount, minRange, maxRange, gameOver, bestScore = null;

  const speeches = {
    start: "Ahh, welcome, brave soul... I have hidden a number between <strong style='color:var(--gold)'>1 and 100</strong> in my mystical vault. Can you unveil it? 🔮",
    tooLow: [
      "Ho ho! Your answer is too <strong style='color:#90C8FF'>COLD</strong>! The spirits whisper... seek higher! ❄️",
      "My enchanted vault holds a mightier number! Go <strong style='color:#90C8FF'>HIGHER</strong>, seeker! 🔵",
      "The stars cry 'higher'! Your guess sits below my secret. Aim <strong style='color:#90C8FF'>ABOVE</strong>! ⬆️"
    ],
    tooHigh: [
      "Bzzzzt! Too <strong style='color:#FF9080'>BLAZING</strong> hot! Descend, dear seeker! 🔥",
      "The cosmic scales tilt — your number soars <strong style='color:#FF9080'>TOO HIGH</strong>! Come down! ⬇️",
      "Flames of excess! Lower your sights, wanderer! My secret hides <strong style='color:#FF9080'>BELOW</strong>! 🌡️"
    ],
    close: "Ohhhh, you're VERY close! The vault trembles with anticipation! 😮",
    win: [
      "🌟 MAGNIFICENT! You have <strong style='color:#80FFB0'>CRACKED MY VAULT</strong> in {n} attempts! The Oracle bows before you!",
      "⚡ INCREDIBLE! The number <strong style='color:#80FFB0'>{secret}</strong> was no match for your wisdom! {n} attempts — a legend is born!",
      "🎉 BRILLIANT MORTAL! You found <strong style='color:#80FFB0'>{secret}</strong> in just <strong style='color:var(--gold)'>{n} tries</strong>! The Oracle applauds you!"
    ],
    maxTries: "😔 The vault remains sealed... My number was <strong style='color:var(--gold)'>{secret}</strong>. Perhaps destiny favors you next time, seeker..."
  };

  function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

  function initGame() {
    secretNumber = Math.floor(Math.random()*100)+1;
    tryCount = 0; minRange = 1; maxRange = 100; gameOver = false;
    document.getElementById('tryCount').textContent = '0';
    document.getElementById('rangeDisplay').textContent = '1–100';
    document.getElementById('rangeFill').style.cssText = 'left:0%;width:100%';
    document.getElementById('prevGuesses').innerHTML = '';
    document.getElementById('guessInput').value = '';
    document.getElementById('guessInput').disabled = false;
    document.getElementById('playAgainBtn').classList.remove('visible');
    setHint('','','');
    setSpeech(speeches.start);
    document.getElementById('oracleFace').textContent = '🧙‍♂️';
  }

  function setSpeech(html) {
    const el = document.getElementById('speechText');
    el.style.opacity = 0;
    setTimeout(() => { el.innerHTML = html; el.style.opacity = 1; }, 200);
  }

  function setHint(type, icon, text) {
    const box = document.getElementById('hintBox');
    box.className = 'hint-box' + (type ? ` ${type} visible` : '');
    document.getElementById('hintIcon').textContent = icon;
    document.getElementById('hintText').textContent = text;
  }

  function updateRange() {
    document.getElementById('rangeDisplay').textContent = `${minRange}–${maxRange}`;
    const left = ((minRange-1)/100)*100;
    const width = ((maxRange-minRange+1)/100)*100;
    document.getElementById('rangeFill').style.left = left+'%';
    document.getElementById('rangeFill').style.width = width+'%';
  }

  function addGuessTag(val) {
    const tag = document.createElement('div');
    tag.className = 'guess-tag';
    tag.textContent = val;
    document.getElementById('prevGuesses').appendChild(tag);
  }

  function bumpTryCount() {
    const el = document.getElementById('tryCount');
    el.textContent = tryCount;
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }

  function launchConfetti() {
    const burst = document.getElementById('confettiBurst');
    burst.innerHTML = '';
    const colors = ['#FFD700','#FF8C00','#FF4500','#80FFB0','#90C8FF','#FFB6C1','#fff'];
    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.cssText = `
        left: ${20+Math.random()*60}%;
        top: ${20+Math.random()*40}%;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        animation-delay: ${Math.random()*0.5}s;
        animation-duration: ${1.5+Math.random()*1}s;
        transform: rotate(${Math.random()*360}deg);
        border-radius: ${Math.random()>0.5?'50%':'2px'};
      `;
      burst.appendChild(piece);
    }
    setTimeout(() => burst.innerHTML = '', 3000);
  }

  function submitGuess() {
    if (gameOver) return;
    const input = document.getElementById('guessInput');
    const val = parseInt(input.value);
    if (!val || val < 1 || val > 100) {
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 400);
      setSpeech("Please enter a valid number between <strong style='color:var(--gold)'>1 and 100</strong>, seeker! 🎯");
      return;
    }

    tryCount++;
    bumpTryCount();
    addGuessTag(val);
    input.value = '';

    const diff = Math.abs(val - secretNumber);

    if (val === secretNumber) {
      gameOver = true;
      document.getElementById('oracleFace').textContent = '🧙';
      document.getElementById('guessInput').disabled = true;
      document.getElementById('playAgainBtn').classList.add('visible');
      if (bestScore === null || tryCount < bestScore) {
        bestScore = tryCount;
        document.getElementById('bestScore').textContent = bestScore;
      }
      launchConfetti();
      const msg = rand(speeches.win).replace(/{n}/g, tryCount).replace(/{secret}/g, secretNumber);
      setSpeech(msg);
      setHint('correct', '🎉', `CORRECT! The number was ${secretNumber}!`);
      document.getElementById('characterCard').classList.add('celebrating');
      setTimeout(() => document.getElementById('characterCard').classList.remove('celebrating'), 700);
    } else if (tryCount >= 10) {
      gameOver = true;
      document.getElementById('oracleFace').textContent = '😔';
      document.getElementById('guessInput').disabled = true;
      document.getElementById('playAgainBtn').classList.add('visible');
      const msg = speeches.maxTries.replace(/{secret}/g, secretNumber);
      setSpeech(msg);
      setHint('too-high', '💀', `Game over! The secret was ${secretNumber}.`);
    } else if (val < secretNumber) {
      minRange = Math.max(minRange, val + 1);
      updateRange();
      document.getElementById('oracleFace').textContent = diff <= 5 ? '😲' : '🧙‍♂️';
      if (diff <= 5) setSpeech(speeches.close);
      else setSpeech(rand(speeches.tooLow));
      setHint('too-low', '⬆️', `Too LOW! Go higher than ${val}.`);
    } else {
      maxRange = Math.min(maxRange, val - 1);
      updateRange();
      document.getElementById('oracleFace').textContent = diff <= 5 ? '😲' : '🧙‍♂️';
      if (diff <= 5) setSpeech(speeches.close);
      else setSpeech(rand(speeches.tooHigh));
      setHint('too-high', '⬇️', `Too HIGH! Go lower than ${val}.`);
    }
  }

  function resetGame() {
    document.getElementById('characterCard').style.animation = 'none';
    initGame();
  }

  // Enter key support
  document.getElementById('guessInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitGuess();
  });

  // Init
  initGame();
</script>
</body>
</html>
